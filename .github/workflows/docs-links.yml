name: docs-links

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs-links.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/docs-links.yml"

permissions:
  contents: read

jobs:
  link-check:
    name: markdown-link-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Write config
        run: |
          cat > .markdown-link-check.json <<'EOF'
          {
            "ignorePatterns": [
              { "pattern": "^http://localhost" },
              { "pattern": "^https://localhost" },
              { "pattern": "^https://127\\.0\\.0\\.1" },
              { "pattern": "^https://aka\\.ms/" },
              { "pattern": "^https://schemas\\.vibeide\\.io/" },
              { "pattern": "^https://vibeide\\.io/" },
              { "pattern": "^(?!https?:)[a-z][a-z0-9+.-]*:" },
              { "pattern": "^https://vscode\\.dev/redirect" },
              { "pattern": "\\.(ts|tsx|js|mjs|cjs|json|css|scss|html|yml|yaml|sh|ps1|bat|py)([#?].*)?$" },
              { "pattern": "\\.vibe/" },
              { "pattern": "^https://(www\\.)?npmjs\\.(com|org)/" },
              { "pattern": "^https://platform\\.openai\\.com/" },
              { "pattern": "^https://claude\\.ai/" },
              { "pattern": "^https://api\\.anthropic\\.com/" },
              { "pattern": "^https://dev\\.azure\\.com/" },
              { "pattern": "^https://marketplace\\.visualstudio\\.com/" },
              { "pattern": "^https://open-vsx\\.org/admin" }
            ],
            "timeout": "20s",
            "retryOn429": true,
            "retryCount": 3,
            "fallbackRetryDelay": "30s",
            "aliveStatusCodes": [200, 203, 206, 301, 302, 308, 403, 405]
          }
          EOF

      - name: Check tracked markdown
        shell: bash
        run: |
          set -euo pipefail
          # Scope to OUR prose docs. Exclude:
          #  - skeleton templates (_template-) with placeholder paths
          #  - upstream-inherited agent/config md (.github/{prompts,skills,instructions})
          #    and VS Code subtrees (extensions/, build/, src/, test/, cli/, scripts/) that
          #    link to private Microsoft repos / fixtures — not ours to validate
          #  - .vibe*/ prompt scaffolding (contains API-endpoint URLs, not doc links)
          mapfile -t FILES < <(git ls-files '*.md' \
            | grep -vE '/_template-|^\.github/(prompts|skills|instructions)/|^docs/(references-v1|v1)/|^extensions/|^build/|^src/|^test/|^cli/|^scripts/|^\.vibe-defaults/|^\.vibe/')
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No tracked markdown files; skipping."
            exit 0
          fi
          npx --yes markdown-link-check@3 --config .markdown-link-check.json --quiet "${FILES[@]}"
