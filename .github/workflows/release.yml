# Публичный репозиторий: минуты Actions не расходуются из бесплатного лимита.
# Триггер: тег vX.Y.Z (рекомендуется) или ручной workflow_dispatch (собирается текущий ref ветки, имя релиза — из поля tag).

name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: read

env:
  # При push тега — ref_name = тег; при ручном запуске — введённый tag (не подменяет checkout ref).
  VIBE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Compile TypeScript (shared artifact for all platforms)
  # ─────────────────────────────────────────────────────────────────
  compile:
    name: Compile TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      # kerberos (node-gyp) needs krb5/GSSAPI headers on Linux;
      # native-keymap needs libx11 + libxkbfile for pkg-config
      - name: Install Linux native build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libkrb5-dev libx11-dev libxkbfile-dev

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Compile TypeScript
        run: npm run compile-build
        timeout-minutes: 45

      - name: Compile extensions
        run: npm run compile-extensions-build
        timeout-minutes: 30

      - name: Upload compiled output
        uses: actions/upload-artifact@v7
        with:
          name: compiled-output
          path: |
            out/
            extensions/*/out/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # Windows — .exe installer (InnoSetup) + .zip portable
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    needs: compile
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: compiled-output

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          npm_config_foreground_scripts: 'true'

      - name: Install InnoSetup
        run: choco install innosetup -y
        shell: powershell

      - name: Build Windows app
        run: node node_modules/gulp/bin/gulp.js vscode-win32-${{ matrix.arch }}
        timeout-minutes: 45

      - name: Build Windows installer (.exe)
        run: node node_modules/gulp/bin/gulp.js vscode-win32-${{ matrix.arch }}-setup
        timeout-minutes: 20

      - name: Build Windows portable (.zip)
        run: node node_modules/gulp/bin/gulp.js vscode-win32-${{ matrix.arch }}-archive
        timeout-minutes: 10

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.arch }}
          path: |
            .build/win32-${{ matrix.arch }}/system-setup/VibeIDESetup-*.exe
            .build/win32-${{ matrix.arch }}/archive/VibeIDE-*.zip

  # ─────────────────────────────────────────────────────────────────
  # macOS — .dmg (Universal Binary: ARM + Intel)
  # ─────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (Universal)
    runs-on: macos-latest
    needs: compile

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: compiled-output

      - name: Install dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          npm_config_foreground_scripts: 'true'

      - name: Build macOS ARM64
        run: node node_modules/gulp/bin/gulp.js vscode-darwin-arm64
        timeout-minutes: 45

      - name: Build macOS x64
        run: node node_modules/gulp/bin/gulp.js vscode-darwin-x64
        timeout-minutes: 45

      - name: Create Universal Binary (.dmg)
        run: |
          # Combine ARM64 + x64 into Universal Binary
          lipo -create \
            ".build/darwin-arm64/VibeIDE.app/Contents/MacOS/Electron" \
            ".build/darwin-x64/VibeIDE.app/Contents/MacOS/Electron" \
            -output ".build/darwin-arm64/VibeIDE.app/Contents/MacOS/Electron"
          node node_modules/gulp/bin/gulp.js vscode-darwin-arm64-dmg
        timeout-minutes: 20

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-universal
          path: .build/darwin-arm64/VibeIDE-*.dmg

  # ─────────────────────────────────────────────────────────────────
  # Linux — .deb, .rpm, .tar.gz + ARM64
  # ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: compile
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Download compiled output
        uses: actions/download-artifact@v4
        with:
          name: compiled-output

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libkrb5-dev libx11-dev libxkbfile-dev rpm fakeroot
          npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          npm_config_foreground_scripts: 'true'

      - name: Build Linux app
        run: node node_modules/gulp/bin/gulp.js vscode-linux-${{ matrix.arch }}
        timeout-minutes: 45

      - name: Build .deb package
        run: node node_modules/gulp/bin/gulp.js vscode-linux-${{ matrix.arch }}-prepare-deb vscode-linux-${{ matrix.arch }}-build-deb
        timeout-minutes: 15

      - name: Build .rpm package
        run: node node_modules/gulp/bin/gulp.js vscode-linux-${{ matrix.arch }}-prepare-rpm vscode-linux-${{ matrix.arch }}-build-rpm
        timeout-minutes: 15

      - name: Build .tar.gz (portable)
        run: node node_modules/gulp/bin/gulp.js vscode-linux-${{ matrix.arch }}-archive
        timeout-minutes: 10

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}
          path: |
            .build/linux-${{ matrix.arch }}/deb/*.deb
            .build/linux-${{ matrix.arch }}/rpm/*.rpm
            .build/linux-${{ matrix.arch }}/archive/*.tar.gz

  # ─────────────────────────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Generate changelog
        run: |
          set -e
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            node scripts/vibe-changelog.js --since "$PREV" > RELEASE_NOTES.md
          else
            node scripts/vibe-changelog.js --first-release "$VIBE_VERSION" > RELEASE_NOTES.md
          fi

      - name: Generate transparency report
        run: node scripts/vibe-transparency-dashboard.js --output transparency.json

      - name: Generate SBOM
        run: |
          node -e "
            const fs = require('fs');
            const product = JSON.parse(fs.readFileSync('product.json', 'utf8'));
            const sbom = {
              bomFormat: 'CycloneDX',
              specVersion: '1.4',
              version: process.env.VIBE_VERSION,
              metadata: { component: { name: 'vibeide', version: product.vibeVersion } },
              components: []
            };
            fs.writeFileSync('sbom.json', JSON.stringify(sbom, null, 2));
          "
        env:
          VIBE_VERSION: ${{ env.VIBE_VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VIBE_VERSION }}
          name: "VibeIDE ${{ env.VIBE_VERSION }}"
          body_path: RELEASE_NOTES.md
          draft: false
          files: |
            release-artifacts/windows-x64/**/*.exe
            release-artifacts/windows-x64/**/*.zip
            release-artifacts/windows-arm64/**/*.exe
            release-artifacts/windows-arm64/**/*.zip
            release-artifacts/macos-universal/**/*.dmg
            release-artifacts/linux-x64/**/*.deb
            release-artifacts/linux-x64/**/*.rpm
            release-artifacts/linux-x64/**/*.tar.gz
            release-artifacts/linux-arm64/**/*.deb
            release-artifacts/linux-arm64/**/*.tar.gz
            sbom.json
            transparency.json
