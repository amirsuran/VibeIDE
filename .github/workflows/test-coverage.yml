# Test coverage — hard gate (L980)
#
# Two jobs:
#   1. pair-check     — file-pair report (helper.ts ↔ helper.test.ts). Soft
#                       informational PR comment.
#   2. line-coverage  — c8 line-coverage gate over the contrib/vibeide pure-
#                       helper Mocha test suite. Reads `.c8rc` thresholds
#                       (lines/functions/branches/statements). Fails the build
#                       if any threshold is missed; this is the hard gate
#                       referenced by roadmap L980.
#
# Why pure-helpers only:
#   The full integration suite needs an Electron build, which is too heavy for
#   PR-time coverage gating. The pure-helper tests run under Node + Mocha
#   against `out/`, so c8 can wrap them directly with no Electron prelaunch.

name: test-coverage

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/vs/workbench/contrib/vibeide/common/**/*.ts'
      - 'src/vs/workbench/contrib/vibeide/test/common/**/*.ts'
      - '.c8rc'
      - '.github/workflows/test-coverage.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  pair-check:
    name: helper / test file pair report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count helper / test pairs
        id: counts
        shell: bash
        run: |
          set -euo pipefail
          HELPERS=$(git ls-files 'src/vs/workbench/contrib/vibeide/common/*.ts' | grep -v 'Service.ts$' | grep -v 'Types.ts$' | wc -l)
          TESTS=$(git ls-files 'src/vs/workbench/contrib/vibeide/test/common/*.test.ts' | wc -l)
          echo "helpers=$HELPERS" >> "$GITHUB_OUTPUT"
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"
          MISSING=$(git ls-files 'src/vs/workbench/contrib/vibeide/common/*.ts' \
            | xargs -I{} basename {} .ts \
            | sort -u \
            | while read -r name; do
                if ! git ls-files 'src/vs/workbench/contrib/vibeide/test/common' | grep -q "${name}.test.ts$"; then
                  echo "$name"
                fi
              done | head -20)
          {
            echo 'missing<<EOF'
            echo "$MISSING"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const helpers = '${{ steps.counts.outputs.helpers }}';
            const tests = '${{ steps.counts.outputs.tests }}';
            const missing = `${{ steps.counts.outputs.missing }}`.trim();
            const top = missing ? missing.split('\n').slice(0, 10).join('\n  • ') : '(all helpers have a test file)';
            const body = [
              '### test-coverage report',
              '',
              `Helper modules in \`common/\`: **${helpers}**`,
              `Test files in \`test/common/\`: **${tests}**`,
              '',
              'Helpers without a same-name test file (top 10):',
              `  • ${top || '(none)'}`,
              '',
              '_Informational — file-pair tracking. Hard gate lives in the `line-coverage` job._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith('### test-coverage report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  line-coverage:
    name: c8 line-coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Install build dependencies
        run: npm ci
        working-directory: build

      - name: Transpile source
        run: npm run transpile-client

      - name: Run pure-helper tests under c8 (hard gate from .c8rc)
        shell: bash
        run: |
          set -euo pipefail
          # Discover transpiled test files under out/.
          TESTS=$(find out/vs/workbench/contrib/vibeide/test/common -name '*.test.js' 2>/dev/null | tr '\n' ' ')
          if [ -z "$TESTS" ]; then
            echo "::error::No transpiled .test.js files found under out/vs/workbench/contrib/vibeide/test/common/ — coverage gate cannot run."
            exit 1
          fi
          # Run mocha under c8; c8 reads .c8rc for thresholds (lines/functions/branches/statements).
          npx --yes c8@9 --config .c8rc --check-coverage \
            npx --yes mocha@10 --reporter spec --timeout 30000 $TESTS

      - name: Upload coverage report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: c8-coverage-report
          path: .build/coverage/
