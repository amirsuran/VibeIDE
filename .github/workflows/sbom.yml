name: Generate SBOM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sbom:
    name: Generate and attach SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (ignore scripts)
        run: npm install --ignore-scripts

      - name: Generate npm SBOM (CycloneDX)
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file sbom-npm.json --output-format JSON || \
          npx cyclonedx-npm --output-file sbom-npm.json --output-format JSON || \
          echo '{"bomFormat":"CycloneDX","specVersion":"1.4","metadata":{"component":{"name":"vibeide"}},"components":[]}' > sbom-npm.json
          echo "NPM SBOM generated"

      - name: Add AI models to SBOM
        run: |
          python3 << 'EOF'
          import json, datetime

          # Load generated npm SBOM
          with open('sbom-npm.json') as f:
              sbom = json.load(f)

          # Add VibeIDE metadata
          sbom['metadata'] = sbom.get('metadata', {})
          sbom['metadata']['timestamp'] = datetime.datetime.utcnow().isoformat() + 'Z'
          sbom['metadata']['component'] = {
              'type': 'application',
              'name': 'VibeIDE',
              'version': '${{ github.ref_name }}',
              'description': 'Open-source AI IDE — transparency and control',
              'licenses': [{'license': {'id': 'MIT'}}]
          }

          # Add AI models section (Phase 1: placeholder, will be populated from registry)
          ai_models = [
              {
                  'type': 'machine-learning-model',
                  'name': 'claude-3-5-sonnet (via API)',
                  'supplier': {'name': 'Anthropic'},
                  'licenses': [{'license': {'name': 'Commercial API — see Anthropic ToS'}}],
                  'properties': [{'name': 'trainingPolicy', 'value': 'opt-out-available'}]
              },
              {
                  'type': 'machine-learning-model',
                  'name': 'gpt-4o (via API)',
                  'supplier': {'name': 'OpenAI'},
                  'licenses': [{'license': {'name': 'Commercial API — see OpenAI ToS'}}],
                  'properties': [{'name': 'trainingPolicy', 'value': 'opt-out-available'}]
              },
              {
                  'type': 'machine-learning-model',
                  'name': 'Ollama local models',
                  'supplier': {'name': 'Various (open-source)'},
                  'description': 'Local models via Ollama — see individual model licenses',
                  'properties': [{'name': 'trainingPolicy', 'value': 'none'}]
              }
          ]

          sbom['components'] = sbom.get('components', []) + ai_models

          # Add bundled extensions section
          bundled_extensions = [
              {
                  'type': 'library',
                  'name': 'vscode-project-manager',
                  'version': 'latest',
                  'licenses': [{'license': {'id': 'GPL-3.0-only'}}],
                  'description': 'Bundled as pre-installed extension (independent license)',
                  'properties': [{'name': 'bundleType', 'value': 'pre-installed-vsix'}]
              }
          ]
          sbom['components'] = sbom.get('components', []) + bundled_extensions

          with open('sbom.json', 'w') as f:
              json.dump(sbom, f, indent=2)
          print(f"SBOM generated with {len(sbom.get('components', []))} components")
          EOF

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
