# Privacy verify — hard gate (L1045 / L1113).
#
# Two stages:
#   1. static-audit  — scripts/privacy-ci-check.mjs (blocked domains in source +
#      product.json; raw fetch() in React without @privacy-approved-fetch).
#      Plus a diff-based check that surfaces NEW outbound call sites added to
#      src/vs/workbench/contrib/vibeide/**.ts on this PR.
#   2. playwright-sniffer — runs the network-mock spec
#      `test/componentFixtures/playwright/tests/privacyNetworkSniffer.spec.ts`
#      which fails the build if the component fixtures (rendered via the
#      component-explorer server) make any outbound request to a blocked
#      telemetry host or to an undeclared external host.
#
# Both stages are required for the workflow to pass — this is the hard gate
# referenced by roadmap L1045 (privacy strict-mode) and L1113 (sniffer
# integration). The earlier warn-only mode is gone.
#
# To allowlist a new external host, edit ALLOWED_EXTERNAL_HOSTS in
# privacyNetworkSniffer.spec.ts. To allow a new outbound call site in source,
# add it to references/v1/privacy-allowlist.md.

name: privacy-verify

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - 'release/*'

permissions:
  contents: read

concurrency:
  group: privacy-verify-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  static-audit:
    name: static source audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Run scripts/privacy-ci-check.mjs (hard gate)
        run: node scripts/privacy-ci-check.mjs

      - name: Diff-based check — flag new outbound call sites without allowlist entry
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          ADDED=$(git diff "$BASE_SHA..$HEAD_SHA" -- 'src/vs/workbench/contrib/vibeide/**/*.ts' \
            | awk '/^\+\+\+ /{ f=substr($0,7) } /^\+[^+]/ { print f ": " substr($0,2) }' \
            | grep -E 'fetch\(|http\.request\(|https\.request\(|net\.connect\(|dns\.lookup\(' || true)
          if [ -z "$ADDED" ]; then
            echo "No new outbound call sites added."
            exit 0
          fi
          if [ ! -f references/v1/privacy-allowlist.md ]; then
            echo "::error::PR introduces outbound call sites but references/v1/privacy-allowlist.md is missing:"
            echo "$ADDED"
            exit 1
          fi
          # If any added line is NOT mentioned in privacy-allowlist.md, fail.
          MISSING=""
          while IFS= read -r line; do
            # crude heuristic: look for a token from the added line in the allowlist
            token=$(echo "$line" | grep -oE 'fetch\(|http\.request\(|https\.request\(|net\.connect\(|dns\.lookup\(' | head -n1)
            file=$(echo "$line" | sed -E 's/:.*//')
            if ! grep -q "$file" references/v1/privacy-allowlist.md ; then
              MISSING+="$line"$'\n'
            fi
          done <<<"$ADDED"
          if [ -n "$MISSING" ]; then
            echo "::error::New outbound call sites not declared in references/v1/privacy-allowlist.md:"
            echo "$MISSING"
            exit 1
          fi
          echo "All new outbound call sites are declared in references/v1/privacy-allowlist.md."

  playwright-sniffer:
    name: playwright network sniffer
    runs-on: ubuntu-latest
    needs: static-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build dependencies
        run: npm ci
        working-directory: build

      - name: Install rspack dependencies
        run: npm ci
        working-directory: build/rspack

      - name: Transpile source
        run: npm run transpile-client

      - name: Install Playwright test dependencies
        run: npm ci
        working-directory: test/componentFixtures/playwright

      - name: Install Playwright Chromium
        run: npx playwright install chromium
        working-directory: test/componentFixtures/playwright

      - name: Run privacy network-sniffer spec (hard gate)
        run: npx playwright test tests/privacyNetworkSniffer.spec.ts
        working-directory: test/componentFixtures/playwright

      - name: Upload Playwright results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: privacy-sniffer-results
          path: test/componentFixtures/playwright/test-results/
