# i18n lint — flag unwrapped user-facing strings in JSX / notify / palette sites.
#
# Single source of truth: src/vs/workbench/contrib/vibeide/common/i18nUnwrappedScanner.ts
# CI runner duplicates the regex set in scripts/scan-vibeide-i18n.mjs (no TS
# compile step required for the workflow). The unit tests on the .ts module
# are the canonical regression coverage; the .mjs runner just walks the tree.
#
# PATH EXCLUSION POLICY (roadmap L484, adopted 2026-05-11):
# The scanner mirrors the rules in common/i18nExtractionPolicy.ts so that
# skill-prompt templates, persona templates, workflow YAML, test fixtures,
# snapshot files, build artefacts, docs-only Markdown, react/out bundles and
# community-pack content NEVER produce lint findings. The same policy gates
# the gulp `extract-vibeide-locale-strings` task — the two stay symmetric
# so a path can't be excluded from translation while still being lint-noisy.
#
# STRICT MODE (roadmap K.4 L520 enabled 2026-05-11):
# Baseline is 0 findings on `main` since the May sweep wrapped all 25 prior
# legacy strings or marked their host files with `@i18n-scan-skip-file`. Any
# regression FAILS CI. To opt a pure CLI helper out, add the directive in its
# header comment; that explicitly documents the trade-off in code review.

name: i18n-lint

on:
  pull_request:
    paths:
      - 'src/vs/workbench/contrib/vibeide/**/*.ts'
      - 'src/vs/workbench/contrib/vibeide/**/*.tsx'
      - 'scripts/scan-vibeide-i18n.mjs'
      - '.github/workflows/i18n-lint.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: i18n lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scan for unwrapped user-facing strings (strict — fail on any)
        shell: bash
        run: |
          set -euo pipefail
          node scripts/scan-vibeide-i18n.mjs --json > /tmp/i18n-scan.json
          findings=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/i18n-scan.json','utf8')).summary.totalFindings)")
          echo "i18n-lint findings: ${findings}"
          if [ "${findings}" -gt 0 ]; then
            node -e "
              const data = JSON.parse(require('fs').readFileSync('/tmp/i18n-scan.json','utf8'));
              for (const { filePath, result } of data.perFile) {
                for (const f of result.findings) {
                  console.log('::error file=' + filePath + ',line=' + f.line + ',col=' + f.column + '::Unwrapped user string (' + f.callsite + '): ' + f.snippet);
                }
              }
            "
            echo ""
            echo "::error::i18n-lint: ${findings} unwrapped user-facing string(s). Wrap with localize() / l10n.t(), or add @i18n-scan-skip-file to the file header if it's a pure CLI helper (see common/standaloneDoctorEnv.ts for precedent)."
            exit 1
          fi
          echo "OK — no unwrapped user-facing literals."
